<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operator Access — SCS Life Safety</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-mark" aria-hidden="true">SCS</div>
        <div>
          <h2>Operator access</h2>
          <p class="login-sub">Life Safety Emergency System</p>
          <p class="login-tag">Authorized personnel only · Rugged tower command</p>
        </div>
      </div>

      <form id="loginForm">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button type="submit" class="btn-login">Sign in</button>
      </form>
      <p id="loginError" class="login-error"></p>
    </div>
  </div>
  <script>
    (async function () {
      const nextUrl = new URLSearchParams(location.search).get('next') || '/';
      const me = await fetch('/api/auth/me', { credentials: 'include' });
      if (me.ok) window.location.href = nextUrl;

      const hint = await fetch('/api/auth/config');
      if (hint.ok) {
        const cfg = await hint.json();
        if (cfg.usernameHint) document.getElementById('username').value = cfg.usernameHint;
      }

      document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const err = document.getElementById('loginError');
        err.textContent = '';
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          err.textContent = data.error || 'Login failed';
          return;
        }
        window.location.href = nextUrl;
      };
    })();
  </script>
</body>
</html>
